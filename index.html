<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OrbitPlanner - Gestión de Presupuestos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; transition: background-color 0.3s, color 0.3s; }
        .donut-ring { transition: stroke-dasharray 0.5s ease; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 10px; }
        .dark { background-color: #000; color: #e4e4e7; }
        .light { background-color: #f8fafc; color: #1e293b; }
    </style>
</head>
<body class="dark">
    <div class="max-w-7xl mx-auto p-4 md:p-8">
        
        <!-- HEADER -->
        <div class="flex justify-between items-center mb-10">
            <header>
                <h1 class="text-4xl font-black tracking-tighter flex items-center gap-3">
                    <span class="text-violet-500">Orbit</span>Planner
                </h1>
                <p class="text-sm font-medium opacity-50">Gestión de presupuestos multiviaje.</p>
            </header>
            <button id="themeToggle" class="p-3 rounded-2xl border border-zinc-800 bg-zinc-900 text-yellow-400 hover:scale-110 transition">
                <svg id="sunIcon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>
            </button>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            
            <!-- LADO IZQUIERDO: EDITOR -->
            <div class="lg:col-span-7 space-y-6">
                <div class="editor-card rounded-[2.5rem] p-6 md:p-8 border border-zinc-800 bg-zinc-950/50 shadow-2xl">
                    <div class="flex justify-between items-start mb-8">
                        <h2 id="formTitle" class="text-xl font-bold flex items-center gap-2">
                            Nuevo Viaje
                        </h2>
                        <!-- Donut Chart SVG -->
                        <div class="relative w-32 h-32">
                            <svg viewBox="0 0 32 32" class="w-full h-full -rotate-90">
                                <circle id="chartTransport" cx="16" cy="16" r="14" fill="transparent" stroke="#8b5cf6" stroke-width="4" stroke-dasharray="0 100" />
                                <circle id="chartHotel" cx="16" cy="16" r="14" fill="transparent" stroke="#f59e0b" stroke-width="4" stroke-dasharray="0 100" />
                                <circle id="chartFood" cx="16" cy="16" r="14" fill="transparent" stroke="#10b981" stroke-width="4" stroke-dasharray="0 100" />
                                <circle id="chartEvents" cx="16" cy="16" r="14" fill="transparent" stroke="#ec4899" stroke-width="4" stroke-dasharray="0 100" />
                            </svg>
                            <div class="absolute inset-0 flex items-center justify-center">
                                <div class="text-center">
                                    <p class="text-[8px] font-black uppercase opacity-50">Total</p>
                                    <p id="totalDisplay" class="text-xs font-black">0€</p>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="space-y-6">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div>
                                <label class="text-[10px] font-bold uppercase tracking-widest opacity-50 mb-1 block">Destino</label>
                                <input id="inDest" type="text" placeholder="Ej. Japón Verano" class="w-full bg-zinc-900 border border-zinc-800 rounded-xl px-4 py-3 outline-none focus:border-violet-500 transition">
                            </div>
                            <div>
                                <label class="text-[10px] font-bold uppercase tracking-widest opacity-50 mb-1 block">Viajeros</label>
                                <input id="inPeople" type="number" value="2" class="w-full bg-zinc-900 border border-zinc-800 rounded-xl px-4 py-3 outline-none focus:border-violet-500 transition">
                            </div>
                        </div>

                        <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
                            <div>
                                <label class="text-[10px] font-bold uppercase tracking-widest opacity-50 mb-1 block">Vuelos</label>
                                <input id="inTransport" type="number" value="0" class="price-input w-full bg-zinc-900 border border-zinc-800 rounded-xl px-4 py-2 outline-none focus:border-violet-500 transition">
                            </div>
                            <div>
                                <label class="text-[10px] font-bold uppercase tracking-widest opacity-50 mb-1 block">Hotel</label>
                                <input id="inHotel" type="number" value="0" class="price-input w-full bg-zinc-900 border border-zinc-800 rounded-xl px-4 py-2 outline-none focus:border-violet-500 transition">
                            </div>
                            <div>
                                <label class="text-[10px] font-bold uppercase tracking-widest opacity-50 mb-1 block">Comida</label>
                                <input id="inFood" type="number" value="0" class="price-input w-full bg-zinc-900 border border-zinc-800 rounded-xl px-4 py-2 outline-none focus:border-violet-500 transition">
                            </div>
                        </div>

                        <div class="rounded-2xl p-5 border border-zinc-800 bg-zinc-900/30">
                            <label class="text-[10px] font-bold uppercase tracking-widest opacity-50 block mb-3">Eventos y Actividades</label>
                            <div class="flex gap-2 mb-4">
                                <input id="evName" placeholder="Nombre evento" class="flex-[2] bg-zinc-950 border border-zinc-800 rounded-xl px-4 py-2 text-sm outline-none focus:border-violet-500 transition">
                                <input id="evPrice" type="number" placeholder="Precio" class="flex-1 bg-zinc-950 border border-zinc-800 rounded-xl px-4 py-2 text-sm outline-none focus:border-violet-500 transition">
                                <button id="addEventBtn" class="bg-violet-600 hover:bg-violet-500 text-white p-2 rounded-xl transition">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
                                </button>
                            </div>
                            <div id="eventList" class="space-y-2 max-h-40 overflow-y-auto pr-1"></div>
                        </div>

                        <div class="pt-4 flex flex-col sm:flex-row items-center gap-6">
                            <div class="flex-1 text-center sm:text-left">
                                <p class="text-[10px] font-bold uppercase tracking-widest opacity-50">Total Estimado</p>
                                <div class="flex items-baseline gap-2 justify-center sm:justify-start">
                                    <span id="bigTotal" class="text-44xl font-black text-3xl">0€</span>
                                    <span id="perPerson" class="text-violet-500 font-bold">/ 0€ pp</span>
                                </div>
                            </div>
                            <button id="saveBtn" class="w-full sm:w-auto bg-violet-600 hover:bg-violet-500 text-white px-10 py-4 rounded-2xl font-black transition-all shadow-xl shadow-violet-500/20 active:scale-95">
                                Añadir al Archivo
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- LADO DERECHO: HISTORIAL -->
            <div class="lg:col-span-5 space-y-6">
                <div class="rounded-[2.5rem] p-6 md:p-8 border border-zinc-800 bg-zinc-950/50 h-full min-h-[500px]">
                    <h2 class="text-xl font-bold mb-8 flex items-center gap-3">
                        Mis Viajes
                    </h2>
                    <div id="tripHistory" class="space-y-4"></div>
                </div>
            </div>

        </div>
    </div>

    <script>
        let trips = [];
        let editingId = null;
        let currentEvents = [];
        let isDarkMode = true;

        // Elementos UI
        const themeBtn = document.getElementById('themeToggle');
        const saveBtn = document.getElementById('saveBtn');
        const addEventBtn = document.getElementById('addEventBtn');
        const eventList = document.getElementById('eventList');
        const tripHistory = document.getElementById('tripHistory');

        // Inputs
        const inDest = document.getElementById('inDest');
        const inPeople = document.getElementById('inPeople');
        const inTransport = document.getElementById('inTransport');
        const inHotel = document.getElementById('inHotel');
        const inFood = document.getElementById('inFood');
        const evName = document.getElementById('evName');
        const evPrice = document.getElementById('evPrice');

        // Theme Toggle
        themeBtn.onclick = () => {
            isDarkMode = !isDarkMode;
            document.body.className = isDarkMode ? 'dark' : 'light';
            themeBtn.className = isDarkMode 
                ? 'p-3 rounded-2xl border border-zinc-800 bg-zinc-900 text-yellow-400' 
                : 'p-3 rounded-2xl border border-slate-200 bg-white text-slate-600 shadow-sm';
            updateUI();
        };

        function calculateTotals() {
            const transport = parseFloat(inTransport.value) || 0;
            const hotel = parseFloat(inHotel.value) || 0;
            const food = parseFloat(inFood.value) || 0;
            const eventsTotal = currentEvents.reduce((s, e) => s + e.price, 0);
            const total = transport + hotel + food + eventsTotal;
            const people = parseInt(inPeople.value) || 1;
            return { transport, hotel, food, eventsTotal, total, people };
        }

        function updateUI() {
            const { transport, hotel, food, eventsTotal, total, people } = calculateTotals();
            
            // Textos
            document.getElementById('totalDisplay').innerText = Math.round(total) + '€';
            document.getElementById('bigTotal').innerText = Math.round(total) + '€';
            document.getElementById('perPerson').innerText = '/ ' + Math.round(total / people) + '€ pp';

            // Gráfica
            updateChart(transport, hotel, food, eventsTotal, total);
            
            // Lista de eventos
            eventList.innerHTML = currentEvents.map(e => `
                <div class="flex justify-between items-center p-3 rounded-xl border border-zinc-900 bg-zinc-950">
                    <span class="text-sm font-medium">${e.name}</span>
                    <div class="flex items-center gap-4">
                        <span class="text-sm font-bold text-violet-500">${e.price}€</span>
                        <button onclick="removeEvent(${e.id})" class="text-zinc-600 hover:text-red-500">×</button>
                    </div>
                </div>
            `).join('');

            // Lista de Viajes
            renderHistory();
        }

        function updateChart(t, h, f, e, total) {
            const circles = [
                { el: 'chartTransport', val: t },
                { el: 'chartHotel', val: h },
                { el: 'chartFood', val: f },
                { el: 'chartEvents', val: e }
            ];
            
            let accumulated = 0;
            circles.forEach(c => {
                const circle = document.getElementById(c.el);
                if (total === 0) {
                    circle.setAttribute('stroke-dasharray', '0 100');
                    return;
                }
                const percent = (c.val / total) * 100;
                circle.setAttribute('stroke-dasharray', `${percent} ${100 - percent}`);
                circle.setAttribute('stroke-dashoffset', -accumulated);
                accumulated += percent;
            });
        }

        addEventBtn.onclick = () => {
            if (!evName.value || !evPrice.value) return;
            currentEvents.push({ id: Date.now(), name: evName.value, price: parseFloat(evPrice.value) });
            evName.value = ''; evPrice.value = '';
            updateUI();
        };

        window.removeEvent = (id) => {
            currentEvents = currentEvents.filter(e => e.id !== id);
            updateUI();
        };

        saveBtn.onclick = () => {
            if (!inDest.value) return;
            const tripData = {
                id: editingId || Date.now(),
                destination: inDest.value,
                people: parseInt(inPeople.value),
                priceTransport: parseFloat(inTransport.value),
                priceHotel: parseFloat(inHotel.value),
                priceFood: parseFloat(inFood.value),
                events: [...currentEvents]
            };

            if (editingId) {
                trips = trips.map(t => t.id === editingId ? tripData : t);
                editingId = null;
                saveBtn.innerText = "Añadir al Archivo";
            } else {
                trips.unshift(tripData);
            }

            resetForm();
            updateUI();
        };

        function resetForm() {
            inDest.value = ''; inPeople.value = 2; inTransport.value = 0; 
            inHotel.value = 0; inFood.value = 0; currentEvents = [];
        }

        function renderHistory() {
            if (trips.length === 0) {
                tripHistory.innerHTML = '<div class="py-20 text-center opacity-30">No hay viajes guardados</div>';
                return;
            }
            tripHistory.innerHTML = trips.map(t => {
                const total = t.priceTransport + t.priceHotel + t.priceFood + t.events.reduce((s,e)=>s+e.price,0);
                return `
                <div onclick="editTrip(${t.id})" class="p-5 rounded-2xl border ${editingId === t.id ? 'border-violet-500 bg-violet-500/10' : 'border-zinc-800 bg-zinc-900/40'} cursor-pointer hover:border-zinc-600 transition">
                    <div class="flex justify-between items-start mb-2">
                        <h4 class="font-black">${t.destination}</h4>
                        <button onclick="deleteTrip(event, ${t.id})" class="text-zinc-600 hover:text-red-500">
                             <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>
                        </button>
                    </div>
                    <div class="flex justify-between items-end">
                        <div>
                            <p class="text-[10px] font-bold opacity-50 uppercase">Total</p>
                            <p class="text-xl font-black">${Math.round(total)}€</p>
                        </div>
                        <div class="text-right">
                             <p class="text-[10px] font-bold opacity-50 uppercase">${t.people} Personas</p>
                             <p class="text-lg font-bold text-violet-500">${Math.round(total/t.people)}€ pp</p>
                        </div>
                    </div>
                </div>
                `;
            }).join('');
        }

        window.editTrip = (id) => {
            const trip = trips.find(t => t.id === id);
            editingId = id;
            inDest.value = trip.destination;
            inPeople.value = trip.people;
            inTransport.value = trip.priceTransport;
            inHotel.value = trip.priceHotel;
            inFood.value = trip.priceFood;
            currentEvents = [...trip.events];
            saveBtn.innerText = "Actualizar Viaje";
            document.getElementById('formTitle').innerText = "Editando: " + trip.destination;
            updateUI();
            window.scrollTo({top: 0, behavior: 'smooth'});
        };

        window.deleteTrip = (e, id) => {
            e.stopPropagation();
            trips = trips.filter(t => t.id !== id);
            if(editingId === id) {
                editingId = null;
                resetForm();
            }
            updateUI();
        };

        // Listeners para actualizaciones en vivo
        document.querySelectorAll('input').forEach(input => {
            input.oninput = updateUI;
        });

        // Inicio
        updateUI();
    </script>
</body>
</html>
